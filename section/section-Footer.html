<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footer - 서치폴라리스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #08090A;
  --bg-elevated: #111214;
  --bg-surface: #18191C;
  --border: #232323;
  --border-light: rgba(255,255,255,0.08);
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.5);
  --text-tertiary: rgba(255,255,255,0.35);
  --text-muted: rgba(255,255,255,0.2);
  --white: #FFFFFF;
  --accent: #FFFFFF;
  --radius: 8px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Menlo', 'Monaco', 'Courier New', monospace;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-secondary);
  line-height: 1.6;
  overflow-x: hidden;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ===== LAYOUT ===== */
.section-border {
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  max-width: 1280px;
  margin: 0 auto;
}

/* ===== FOOTER ===== */
.footer {
  padding: 80px 48px 0;
}

.footer-upper {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 48px;
}

/* -- Contact Info (Left) -- */
.footer-contact-title {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  margin-bottom: 32px;
}

.footer-info {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.footer-info-row {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.footer-info-row strong {
  font-weight: 600;
  color: var(--text-primary);
}

/* -- Badge Area (Right) -- */
.footer-badge {
  flex-shrink: 0;
}

.footer-badge-placeholder {
  width: 140px;
  height: 140px;
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  font-size: 12px;
  font-family: var(--font-mono);
  text-align: center;
  line-height: 1.4;
  padding: 16px;
}

/* -- Divider -- */
.footer-divider {
  height: 1px;
  background: var(--border);
  margin-top: 48px;
}

/* -- Copyright Bar -- */
.footer-lower {
  padding: 24px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-copyright {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

/* -- Powered by -- */
.footer-powered {
  display: flex;
  align-items: center;
  gap: 16px;
}

.footer-powered-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.footer-powered-logos {
  display: flex;
  align-items: center;
  gap: 20px;
}

.footer-powered-logo {
  height: 16px;
  width: auto;
  opacity: 0.7;
  transition: opacity 0.2s ease;
}

.footer-powered-logo[alt="Peec.ai"] {
  height: 13px;
}

.footer-powered-logo:hover {
  opacity: 1;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .section-border {
    border-left: none;
    border-right: none;
  }
  .footer {
    padding: 64px 32px 0;
  }
  .footer-lower {
    padding: 24px 32px;
  }
}

@media (max-width: 768px) {
  .footer {
    padding: 48px 24px 0;
  }
  .footer-upper {
    flex-direction: column;
    gap: 40px;
  }
  .footer-lower {
    padding: 20px 24px;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .footer-powered {
    justify-content: center;
  }
}
</style>
</head>
<body>

<div class="section-border">
  <footer class="footer">
    <div class="footer-upper">
      <!-- Left: Contact Info -->
      <div class="footer-left">
        <h3 class="footer-contact-title">Contact</h3>
        <div class="footer-info">
          <p class="footer-info-row"><strong>Company</strong> : 스키마타랩스 &nbsp;&nbsp;<strong>대표자명</strong> : 강세연</p>
          <p class="footer-info-row"><strong>사업자등록번호</strong> : 845-22-01670</p>
          <p class="footer-info-row"><strong>E-mail</strong> : team@searchpolaris.com</p>
          <p class="footer-info-row"><strong>Address</strong> : 서울특별시 강남구 영동대로 602 6층 z225</p>
        </div>
      </div>

    </div>

    <div class="footer-divider"></div>

    <div class="footer-lower">
      <p class="footer-copyright">&copy; 2026 SearchPolaris. All Rights Reserved</p>
      <div class="footer-powered">
        <span class="footer-powered-label">Powered by</span>
        <div class="footer-powered-logos">
          <img src="../image/logos/logo-ahrefs.png" alt="Ahrefs" class="footer-powered-logo">
          <img src="../image/logos/logo-peec-ai.svg" alt="Peec.ai" class="footer-powered-logo">
          <img src="../image/logos/logo-semrush.svg" alt="Semrush" class="footer-powered-logo">
        </div>
      </div>
    </div>
  </footer>
</div>

</body>
</html>
