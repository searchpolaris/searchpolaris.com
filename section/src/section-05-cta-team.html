<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA + Team Section</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #08090A;
  --bg-elevated: #111214;
  --bg-surface: #18191C;
  --border: #232323;
  --border-light: rgba(255,255,255,0.08);
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.5);
  --text-tertiary: rgba(255,255,255,0.35);
  --text-muted: rgba(255,255,255,0.2);
  --white: #FFFFFF;
  --radius: 8px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Menlo', 'Monaco', 'Courier New', monospace;
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-secondary);
  line-height: 1.6;
  overflow-x: hidden;
}

h1, h2, h3 {
  font-family: var(--font-sans);
  color: var(--text-primary);
  font-weight: 700;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 120px;
}

.section-border {
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  max-width: 1280px;
  margin: 0 auto;
}

.section-divider {
  height: 1px;
  background: var(--border);
  max-width: 1280px;
  margin: 0 auto;
}

/* ===== BTN CTA ===== */
.btn-cta {
  font-family: var(--font-sans);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.025em;
  text-transform: uppercase;
  color: #111111;
  background: var(--white);
  padding: 16px 32px;
  border-radius: var(--radius);
  transition: all 0.2s;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-cta:hover {
  background: rgba(255,255,255,0.9);
  transform: translateY(-1px);
}

/* ===== CTA + TEAM ===== */
.cta-team {
  padding: 96px 0;
}

.cta-team-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
}

.team-intro h2 {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
}

.team-intro h2 .highlight {
  background: rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 4px;
}

.team-intro > p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 28px;
}

.team-avatars {
  display: flex;
  align-items: center;
  gap: 16px;
}

.team-avatar-group {
  display: flex;
}

.team-avatar-group .avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 2px solid var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text-tertiary);
  overflow: hidden;
  transition: transform 0.3s ease, margin 0.3s ease;
  cursor: pointer;
}

.team-avatar-group .avatar:hover {
  transform: translateY(-4px) scale(1.1);
  border-color: rgba(255,255,255,0.2);
}

.team-avatar-group .avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.team-avatar-group .avatar + .avatar {
  margin-left: -12px;
}

.team-avatar-group:hover .avatar + .avatar {
  margin-left: 4px;
}

.team-meta .team-names {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.team-meta .team-roles {
  font-size: 13px;
  color: var(--text-tertiary);
}

.cta-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px;
  text-align: center;
}

.cta-card h3 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 12px;
}

.cta-card > p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 24px;
}

.cta-card .btn-cta {
  width: 100%;
  text-align: center;
  margin-bottom: 16px;
}

.cta-card .cta-note {
  font-size: 13px;
  color: var(--text-tertiary);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .container { padding: 0 48px; }
  .section-border { border-left: none; border-right: none; max-width: 100%; }
  .cta-team-grid { gap: 32px; }
}

@media (max-width: 768px) {
  .container { padding: 0 24px; }
  .cta-team-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- DIVIDER -->
<div class="section-divider"></div>

<!-- CTA + TEAM -->
<div class="section-border" id="contact">
  <section class="cta-team">
    <div class="container">
      <div class="cta-team-grid">
        <div class="team-intro">
          <h2>GEO 엔지니어와 콘텐츠 전문가가<br><span class="highlight">당신의 팀</span>으로 일합니다.</h2>
          <p>AI 검색 노출은 예고 없이 바뀝니다. 서치폴라리스는 브랜드의 AI 가시성을 상시 모니터링하고, 무슨 일이 생겨도 1시간 이내에 원인 분석과 해결까지 완료합니다.</p>
          <div class="team-avatars">
            <div class="team-avatar-group">
              <div class="avatar"><img src="../image/team/consultant_1.png" alt="컨설턴트 1"></div>
              <div class="avatar"><img src="../image/team/consultant_2.png" alt="컨설턴트 2"></div>
            </div>
            <div class="team-meta">
              <div class="team-names">서치폴라리스 팀</div>
              <div class="team-roles">GEO 모니터링 + 1시간 내 긴급 대응</div>
            </div>
          </div>
        </div>
        <div class="cta-card">
          <h3>지금 AI 답변 리스크를 점검하세요</h3>
          <p>무료 AI 가시성 진단으로 현재 브랜드의 AI 검색 노출 상태와 오답변 리스크를 확인해 드립니다.</p>
          <a href="#" class="btn-cta"><img src="../image/team/googlemeetlogo.png" alt="Google Meet" style="width:20px; height:auto; flex-shrink:0;">무료 진단 신청하기</a>
          <p class="cta-note">부담 없이 30분 통화</p>
        </div>
      </div>
    </div>
  </section>
</div>

</body>
</html>
