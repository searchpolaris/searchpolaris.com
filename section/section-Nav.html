<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서치폴라리스 - Navigation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { font-family: inherit; border: none; cursor: pointer; }

/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #08090A;
  --bg-elevated: #111214;
  --bg-surface: #18191C;
  --border: #232323;
  --border-light: rgba(255,255,255,0.08);
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.5);
  --text-tertiary: rgba(255,255,255,0.35);
  --text-muted: rgba(255,255,255,0.2);
  --white: #FFFFFF;
  --accent: #FFFFFF;
  --radius: 8px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Menlo', 'Monaco', 'Courier New', monospace;
}

/* ===== BASE ===== */
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-secondary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  height: 80px;
  background: rgba(8,9,10,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  position: relative;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 0;
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.logo-cursor {
  width: 3px;
  height: 22px;
  background: #FF4500;
  border-radius: 1px;
  flex-shrink: 0;
  margin-left: 6px;
}

.header-nav {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 32px;
}

.header-nav > a,
.nav-dropdown > .nav-dropdown-trigger {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-tertiary);
  transition: color 0.2s;
  letter-spacing: 0.01em;
  background: none;
  padding: 0;
}

.header-nav > a:hover,
.header-nav > a.active,
.nav-dropdown:hover > .nav-dropdown-trigger,
.nav-dropdown.active > .nav-dropdown-trigger { color: var(--text-primary); }

.nav-dropdown { position: relative; }

.nav-dropdown-trigger {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}

.nav-dropdown-trigger svg {
  width: 12px; height: 12px;
  stroke: currentColor; fill: none; stroke-width: 2;
  transition: transform 0.2s;
}

.nav-dropdown:hover .nav-dropdown-trigger svg { transform: rotate(180deg); }

.nav-dropdown-menu {
  position: absolute;
  top: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px;
  min-width: 160px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
  z-index: 999;
}

.nav-dropdown-menu::before {
  content: '';
  position: absolute;
  top: -16px; left: 0; right: 0;
  height: 16px;
}

.nav-dropdown:hover .nav-dropdown-menu { opacity: 1; visibility: visible; }

.nav-dropdown-menu a {
  display: block;
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  padding: 10px 14px;
  border-radius: 8px;
  transition: all 0.15s;
}

.nav-dropdown-menu a:hover { color: var(--text-primary); background: var(--bg-surface); }
.nav-dropdown-menu a.active { color: var(--text-primary); }

.btn-header {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--white);
  padding: 10px 24px;
  border-radius: var(--radius);
  transition: opacity 0.2s;
}

.btn-header:hover { opacity: 0.9; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-nav { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="../searchpolaris.html" class="header-logo">
      <span style="font-weight:100">Search</span>Polaris
      <span class="logo-cursor"></span>
    </a>
    <nav class="header-nav">
      <a href="#services">서비스</a>
      <a href="../searchpolaris.html#case-study">성과</a>
      <a href="#faq">FAQ</a>
    </nav>
    <a href="#contact" class="btn-header">상담 신청</a>
  </div>
</header>

</body>
</html>
