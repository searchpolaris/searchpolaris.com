<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off Site GEO Process Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #FFFFFF;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 60px 40px;
}

.diagram {
  position: relative;
  width: 920px;
  min-height: 580px;
}

/* ===== SVG Lines ===== */
.lines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.lines line, .lines polyline {
  stroke: #1a1a1a;
  stroke-width: 1.5;
  fill: none;
}

/* ===== Box Base ===== */
.box {
  position: absolute;
  background: #FFFFFF;
  border: 1.5px solid #1a1a1a;
  border-radius: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  z-index: 1;
}

.box-icon {
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.box-label {
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  letter-spacing: -0.01em;
}

.box-sub {
  font-size: 12px;
  font-weight: 400;
  color: #666;
  margin-top: 4px;
}

/* ===== Accent Box (red border) ===== */
.box-accent {
  border: 1.5px solid #E8513D;
  border-radius: 0;
  background: #FFFFFF;
}

.box-accent .box-label {
  font-weight: 700;
}

.box-accent .box-sub {
  color: #1a1a1a;
  font-size: 13px;
  font-weight: 400;
}

/* ===== Platform Logo Icons ===== */
.platform-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.platform-icon img,
.platform-icon svg {
  width: 28px;
  height: 28px;
}

.platform-icon.icon-sm svg {
  width: 20px;
  height: 20px;
}

/* ===== ChatGPT Icon ===== */
.chatgpt-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chatgpt-icon img {
  width: 36px;
  height: 36px;
}

/* ===== Signal dot animation ===== */
.signal-dot {
  fill: #E8513D;
  opacity: 0.7;
}

/* ===== ROW 1: Platform boxes (5 columns) ===== */
.row1-box1 {
  top: 0;
  left: 0;
  width: 160px;
  height: 100px;
  padding: 16px;
}

.row1-box2 {
  top: 0;
  left: 190px;
  width: 160px;
  height: 100px;
  padding: 16px;
}

.row1-box3 {
  top: 0;
  left: 380px;
  width: 160px;
  height: 100px;
  padding: 16px;
}

.row1-box4 {
  top: 0;
  left: 570px;
  width: 160px;
  height: 100px;
  padding: 16px;
}

.row1-box5 {
  top: 0;
  left: 760px;
  width: 160px;
  height: 100px;
  padding: 16px;
}

/* ===== ROW 2: Center accent box ===== */
.row2-center {
  top: 210px;
  left: 50%;
  transform: translateX(-50%);
  width: 340px;
  height: 110px;
  padding: 20px;
}

/* ===== ROW 3: ChatGPT box ===== */
.row3-center {
  top: 430px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 110px;
  padding: 20px;
}
</style>
</head>
<body>

<div class="diagram">
  <!-- SVG Connection Lines -->
  <svg class="lines" viewBox="0 0 920 580" preserveAspectRatio="xMidYMid meet">
    <!-- Row1 to Row2: 5 platforms merge into center -->
    <!-- Box1 center: 80, Box2 center: 270, Box3 center: 460, Box4 center: 650, Box5 center: 840 -->
    <line x1="80" y1="100" x2="80" y2="155" />
    <line x1="80" y1="155" x2="460" y2="155" />
    <line x1="270" y1="100" x2="270" y2="155" />
    <line x1="460" y1="100" x2="460" y2="155" />
    <line x1="650" y1="100" x2="650" y2="155" />
    <line x1="840" y1="100" x2="840" y2="155" />
    <line x1="840" y1="155" x2="460" y2="155" />
    <line x1="460" y1="155" x2="460" y2="210" />

    <!-- Row2 to Row3: center to ChatGPT -->
    <line x1="460" y1="320" x2="460" y2="430" />

    <!-- Arrow head on last line -->
    <polygon points="460,428 454,416 466,416" fill="#1a1a1a" />
  </svg>

  <!-- ROW 1: External Platform Sources -->
  <div class="box row1-box1">
    <div class="box-icon">
      <div class="platform-icon icon-sm">
        <svg fill="#FF5A4A" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M0 3a3 3 0 1 0 6 0 3 3 0 0 0-6 0m9 18a3 3 0 1 0 6 0 3 3 0 0 0-6 0m0-9a3 3 0 1 0 6 0 3 3 0 0 0-6 0m0-9a3 3 0 1 0 6 0 3 3 0 0 0-6 0m9 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0"/></svg>
      </div>
    </div>
    <span class="box-label">Tistory</span>
    <span class="box-sub">블로그 콘텐츠</span>
  </div>

  <div class="box row1-box2">
    <div class="box-icon">
      <div class="platform-icon icon-sm">
        <svg fill="#03C75A" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16.273 12.845 7.376 0H0v24h7.726V11.156L16.624 24H24V0h-7.727v12.845Z"/></svg>
      </div>
    </div>
    <span class="box-label">Naver Blog</span>
    <span class="box-sub">검색 노출</span>
  </div>

  <div class="box row1-box3">
    <div class="box-icon">
      <div class="platform-icon">
        <svg fill="#FF4500" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.373 0 0 5.373 0 12c0 3.314 1.343 6.314 3.515 8.485l-2.286 2.286C.775 23.225 1.097 24 1.738 24H12c6.627 0 12-5.373 12-12S18.627 0 12 0Zm4.388 3.199c1.104 0 1.999.895 1.999 1.999 0 1.105-.895 2-1.999 2-.946 0-1.739-.657-1.947-1.539v.002c-1.147.162-2.032 1.15-2.032 2.341v.007c1.776.067 3.4.567 4.686 1.363.473-.363 1.064-.58 1.707-.58 1.547 0 2.802 1.254 2.802 2.802 0 1.117-.655 2.081-1.601 2.531-.088 3.256-3.637 5.876-7.997 5.876-4.361 0-7.905-2.617-7.998-5.87-.954-.447-1.614-1.415-1.614-2.538 0-1.548 1.255-2.802 2.803-2.802.645 0 1.239.218 1.712.585 1.275-.79 2.881-1.291 4.64-1.365v-.01c0-1.663 1.263-3.034 2.88-3.207.188-.911.993-1.595 1.959-1.595Zm-8.085 8.376c-.784 0-1.459.78-1.506 1.797-.047 1.016.64 1.429 1.426 1.429.786 0 1.371-.369 1.418-1.385.047-1.017-.553-1.841-1.338-1.841Zm7.406 0c-.786 0-1.385.824-1.338 1.841.047 1.017.634 1.385 1.418 1.385.785 0 1.473-.413 1.426-1.429-.046-1.017-.721-1.797-1.506-1.797Zm-3.703 4.013c-.974 0-1.907.048-2.77.135-.147.015-.241.168-.183.305.483 1.154 1.622 1.964 2.953 1.964 1.33 0 2.47-.81 2.953-1.964.057-.137-.037-.29-.184-.305-.863-.087-1.795-.135-2.769-.135Z"/></svg>
      </div>
    </div>
    <span class="box-label">Reddit</span>
    <span class="box-sub">커뮤니티 신호</span>
  </div>

  <div class="box row1-box4">
    <div class="box-icon">
      <div class="platform-icon">
        <svg fill="#000000" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12.09 13.119c-.936 1.932-2.217 4.548-2.853 5.728-.616 1.074-1.127.931-1.532.029-1.406-3.321-4.293-9.144-5.651-12.409-.251-.601-.441-.987-.619-1.139-.181-.15-.554-.24-1.122-.271C.103 5.033 0 4.982 0 4.898v-.455l.052-.045c.924-.005 5.401 0 5.401 0l.051.045v.434c0 .119-.075.176-.225.176l-.564.031c-.485.029-.727.164-.727.436 0 .135.053.33.166.601 1.082 2.646 4.818 10.521 4.818 10.521l.136.046 2.411-4.81-.482-1.067-1.658-3.264s-.318-.654-.428-.872c-.728-1.443-.712-1.518-1.447-1.617-.207-.023-.313-.05-.313-.149v-.468l.06-.045h4.292l.113.037v.451c0 .105-.076.15-.227.15l-.308.047c-.792.061-.661.381-.136 1.422l1.582 3.252 1.758-3.504c.293-.64.233-.801.111-.947-.07-.084-.305-.22-.812-.24l-.201-.021c-.052 0-.098-.015-.145-.051-.045-.031-.067-.076-.067-.129v-.427l.061-.045c1.247-.008 4.043 0 4.043 0l.059.045v.436c0 .121-.059.178-.193.178-.646.03-.782.095-1.023.439-.12.186-.375.589-.646 1.039l-2.301 4.273-.065.135 2.792 5.712.17.048 4.396-10.438c.154-.422.129-.722-.064-.895-.197-.172-.346-.273-.857-.295l-.42-.016c-.061 0-.105-.014-.152-.045-.043-.029-.072-.075-.072-.119v-.436l.059-.045h4.961l.041.045v.437c0 .119-.074.18-.209.18-.648.03-1.127.18-1.443.421-.314.255-.557.616-.736 1.067 0 0-4.043 9.258-5.426 12.339-.525 1.007-1.053.917-1.503-.031-.571-1.171-1.773-3.786-2.646-5.71l.053-.036z"/></svg>
      </div>
    </div>
    <span class="box-label">Wikipedia</span>
    <span class="box-sub">권위 출처</span>
  </div>

  <div class="box row1-box5">
    <div class="box-icon">
      <div class="platform-icon">
        <!-- Megaphone / Digital PR -->
        <svg fill="#1a1a1a" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 11v2h4v-2h-4zm-2 6.61c.96.71 2.21 1.65 3.2 2.39.4-.53.8-1.07 1.2-1.6-.99-.74-2.24-1.68-3.2-2.4-.4.54-.8 1.08-1.2 1.61zM20.4 5.6c-.4-.53-.8-1.07-1.2-1.6-.99.74-2.24 1.68-3.2 2.4.4.53.8 1.07 1.2 1.6.96-.72 2.21-1.65 3.2-2.4zM4 9c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1l5 3V6L5 9H4zm11.5 3c0-1.33-.58-2.53-1.5-3.35v6.69c.92-.81 1.5-2.01 1.5-3.34z"/></svg>
      </div>
    </div>
    <span class="box-label">Digital PR</span>
    <span class="box-sub">디지털 PR / 평판 관리</span>
  </div>

  <!-- ROW 2: Center Accent Box -->
  <div class="box box-accent row2-center">
    <span class="box-label">Off Site GEO 전략</span>
    <span class="box-sub">외부 신뢰 신호 x 브랜드 언급 x 권위 구축</span>
  </div>

  <!-- ROW 3: ChatGPT Destination -->
  <div class="box row3-center">
    <div class="box-icon">
      <div class="chatgpt-icon">
        <svg viewBox="0 0 24 24" fill="#1a1a1a" xmlns="http://www.w3.org/2000/svg"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>
      </div>
    </div>
    <span class="box-label">AI 답변에 브랜드 인용</span>
    <span class="box-sub">ChatGPT 신뢰 신호 수신</span>
  </div>

</div>

</body>
</html>
